services:
  # ------------------------------------------keyservice: 2 stateless replicas
  keyservice:
    build: ./keyservice
    deploy:
      replicas: 2
    expose:
      - "8080"
    environment:
      DATABASE_URL: "postgres://mint:mint_dev@postgres:5432/mint?sslmode=disable"
      ADMIN_TOKEN: "just-works-for-now" #reminder to use secret manager
      KEY_PEPPER: "dev-pepper-rotate-in-prod"
      REDIS_URL: "redis://redis:6379/0" #schema://host:port:dotabase number
      PREWARM_LIMIT: "1000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  #---------------------------migrate: one-shot, runs schema migrations then exits
  migrate:
    image: migrate/migrate:v4.17.1
    volumes:
      - ./keyservice/migrations:/migrations:ro
    command:
      - "-path"
      - "/migrations"
      - "-database"
      - "postgres://mint:mint_dev@postgres:5432/mint?sslmode=disable"
      - up

    depends_on:
      postgres:
        condition: service_healthy
    restart:
      "no"
      #------------------------------nginx:load balancer + entry point
  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - keyservice

  #-------------------------------------postgres:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mint
      POSTGRES_PASSWORD: mint_dev
      POSTGRES_DB: mint
    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mint -d mint"]
      interval: 5s
      timeout: 3s
      retries: 10

  #-----------------------------------------redis: cache +  counter + rate-limit state-----------------
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  redis_data:
